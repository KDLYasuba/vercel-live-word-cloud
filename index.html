<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Word Cloud for Vercel</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="layout">
        <section class="panel control-panel">
          <div class="panel-header">
            <h2>参加者入力</h2>
            <p>司会者が設定したタイトルへワードを投稿します。</p>
          </div>

          <form id="word-form" class="stack-form">
            <label for="word-input">ワード</label>
            <div class="form-row">
              <input
                id="word-input"
                name="word"
                type="text"
                maxlength="120"
                placeholder="例: 今日の感想を入力"
                autocomplete="off"
                required
              />
              <button type="submit">送信</button>
            </div>
          </form>

          <p id="status" class="status">読み込み中...</p>
        </section>

        <section class="panel cloud-panel">
          <div class="panel-header">
            <h2>ライブ表示</h2>
            <p>数秒ごとに更新され、投稿が集計されます。</p>
          </div>

          <div id="cloud" class="cloud" aria-live="polite"></div>

          <div class="stats">
            <div>
              <span class="stat-label">投稿ワード数</span>
              <strong id="total-count">0</strong>
            </div>
            <div>
              <span class="stat-label">ユニーク数</span>
              <strong id="unique-count">0</strong>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
