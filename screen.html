<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screen | Live Word Cloud</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="screen-page">
    <div class="page-shell screen-shell">
      <header class="hero compact-hero">
        <div class="room-info screen-title-bar">
          <span>タイトル</span>
          <strong id="current-room">main</strong>
        </div>
      </header>

      <section class="panel cloud-panel screen-panel">
        <div id="cloud" class="cloud screen-cloud" aria-live="polite"></div>
        <div class="stats">
          <div>
            <span class="stat-label">投稿ワード数</span>
            <strong id="total-count">0</strong>
          </div>
          <div>
            <span class="stat-label">ユニーク数</span>
            <strong id="unique-count">0</strong>
          </div>
          <div>
            <span class="stat-label">更新</span>
            <strong id="status">読み込み中...</strong>
          </div>
        </div>
      </section>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
