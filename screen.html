<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screen | Live Word Cloud</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="screen-page">
    <div class="page-shell screen-shell">
      <header class="hero compact-hero">
        <div class="room-info screen-title-bar">
          <img class="screen-logo" src="/assets/kaigo-sapuri-logo.png" alt="介護サプリ" />
          <span class="screen-title-label">タイトル</span>
          <strong id="current-room">main</strong>
        </div>
      </header>

      <section class="panel cloud-panel screen-panel">
        <div id="cloud" class="cloud screen-cloud" aria-live="polite"></div>
        <div class="stats">
          <div>
            <span class="stat-label">投稿ワード数</span>
            <strong id="total-count">0</strong>
          </div>
          <div>
            <span class="stat-label">ユニーク数</span>
            <strong id="unique-count">0</strong>
          </div>
          <div>
            <span class="stat-label">更新</span>
            <strong id="status">読み込み中...</strong>
          </div>
        </div>
      </section>
    </div>

    <div id="participant-qr-backdrop" class="participant-qr-backdrop" aria-hidden="true"></div>
    <aside class="participant-qr-card" role="button" tabindex="0" aria-label="参加者用フォームのQRコードを拡大表示">
      <span>参加者用</span>
      <img id="participant-qr" alt="参加者用フォームのQRコード" />
      <small id="participant-url"></small>
    </aside>

    <img class="event-logo" src="/assets/happy-care-day-logo.png" alt="HAPPY CARE DAY! KOBE 2026" />

    <script src="/assets/qrcode.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
